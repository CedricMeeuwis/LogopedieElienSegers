<main class="main">
  <div class="sticky-top menu">
    <div class="d-flex flex-row p-4 bg-menu">
      <div class="d-flex flex-row flex-fill gap-3">
        <img src="assets/images/Logo-04.svg" width="128" class="img-fluid">
        <div class="d-flex flex-fill flex-column justify-content-evenly h3 h-100">
          <logopedie-logo></logopedie-logo>
          <span class="sig-font">Elien Segers</span>
        </div>
      </div>
      <div class="d-none d-md-flex align-items-center">
        <a href="contact" class="btn btn-primary rounded-pill">Maak een afspraak</a>
      </div>
      <div class="d-flex d-md-none align-items-center">
        <i class="bi bi-list display-1" data-bs-toggle="offcanvas" href="#navbar" role="button" aria-expanded="false" aria-controls="navbar"></i>
      </div>
    </div>
    <div class="d-none d-md-flex flex-row justify-content-evenly alignt-items-center bg-info py-3">
      <span class="unselectable" [ngClass]="isRouteActive('/') ? 'text-primary' : 'clickable'" (click)="goTo('/')">Home</span>
      <span class="unselectable" [ngClass]="isRouteActive('/over-mij') ? 'text-primary' : 'clickable'" (click)="goTo('/over-mij')">Over mij</span>
      <span class="unselectable" [ngClass]="isRouteActive('/aanbod') ? 'text-primary' : 'clickable'" (click)="goTo('/aanbod')">Aanbod</span>
      <span class="unselectable" [ngClass]="isRouteActive('/contact') ? 'text-primary' : 'clickable'" (click)="goTo('/contact')">Contact</span>
    </div>
  </div>
  <router-outlet/>
  <app-footer></app-footer>
  <div class="offcanvas offcanvas-end bg-info-subtle" tabindex="-1" id="navbar" aria-labelledby="navbarLabel">
    <div class="offcanvas-header bg-light">
      <h3 class="offcanvas-title" id="navbarLabel"><logopedie-logo></logopedie-logo> Segers</h3>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0 fs-3">
      <span class="p-3" data-bs-dismiss="offcanvas" (click)="goTo('/')"><i class="bi bi-house-fill"></i> Home</span>
      <span class="p-3 bg-info" data-bs-dismiss="offcanvas" (click)="goTo('/over-mij')"><i class="bi bi-person-fill"></i> Over mij</span>
      <span class="p-3" data-bs-dismiss="offcanvas" (click)="goTo('/aanbod')"><i class="bi bi-file-earmark-text-fill"></i> Aanbod</span>
      <span class="p-3 bg-info" data-bs-dismiss="offcanvas" (click)="goTo('/contact')"><i class="bi bi-telephone-fill"></i> Contact</span>
    </div>
  </div>
</main>
